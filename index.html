<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="script.js" defer></script>
</head>

<body>

    <h2>Dashboard</h2>

    <!-- Upload zone -->
    <div id="upload-zone">
        <input type="file" id="file-input" accept=".csv" hidden />
        <p>CSV file<button onclick="document.getElementById('file-input').click()">Choose File</button>
        </p>
        <!-- <p>Expected columns: device_id, local_timestamp,</p> -->
    </div>

    <!-- Device / Sensor always visible -->
    <div>
        <label for="device-select">Device:</label>
        <select id="device-select">
            <option value="">— load a file —</option>
        </select>

        <label for="sensor-select">Sensor:</label>
        <select id="sensor-select">
            <option value="">— load a file —</option>
        </select>
    </div>

    <!-- Export shown after data loads -->
    <div id="controls" hidden>
        <label>From: <input type="time" id="time-from" step="1" /></label>
        <label>To: <input type="time" id="time-to" step="1" /></label>
        <button id="export-btn">Export CSV</button>
    </div>

    <!-- Stat cards -->
    <div id="cards" hidden>
        <p>Latest Value: <strong id="stat-latest">—</strong></p>
        <p>Average: <strong id="stat-avg">—</strong></p>
        <p>Min: <strong id="stat-min">—</strong></p>
        <p>Max: <strong id="stat-max">—</strong></p>
        <p>Readings: <strong id="stat-count">—</strong></p>
    </div>

    <!-- Chart -->
    <div id="chart-section" hidden>
        <h3 id="chart-title">Sensor Data</h3>
        <canvas id="chart-main" height="100"></canvas>
    </div>

        // ── Populate dropdowns ──────────────────────────────────────────
        function populateDevices() {

        document.getElementById('time-to').addEventListener('change', renderDashboard);

        // ── Time helpers ────────────────────────────────────────────────
        function timeToSeconds(str) {
            const [h, m, s] = str.split(':').map(Number);
            return h * 3600 + m * 60 + (s || 0);
        }
        function rowTimeSeconds(d) {
            return d.getHours() * 3600 + d.getMinutes() * 60 + d.getSeconds();
        }

        // ── Render ──────────────────────────────────────────────────────
        function renderDashboard() {
            const deviceId = document.getElementById('device-select').value;
            const sensorId = document.getElementById('sensor-select').value;
            const fromSec = timeToSeconds(document.getElementById('time-from').value || '00:00:00');
            const toSec = timeToSeconds(document.getElementById('time-to').value || '23:59:59');

            // Filter rows by device + time interval, then extract chosen sensor reading
            const points = allRows
                .filter(r => r.device_id === deviceId)
                .filter(r => { const s = rowTimeSeconds(r._ts); return s >= fromSec && s <= toSec; })
                .sort((a, b) => a._ts - b._ts)
                .map(r => {
                    const s = r.sensors.find(s => s.id === sensorId);

                updateCards(null);
                clearChart();
                return;

            updateCards(points);
            drawChart(points, sensorId);

        // ── Stat cards ──────────────────────────────────────────────────
        function updateCards(points) {
            if (!points) {

                return;

            document.getElementById('stat-avg').textContent = avg.toFixed(2);
            document.getElementById('stat-min').textContent = Math.min(...vals).toFixed(2);
            document.getElementById('stat-max').textContent = Math.max(...vals).toFixed(2);
            document.getElementById('stat-count').textContent = vals.length;
        }

            const ctx = document.getElementById('chart-main').getContext('2d');

                type: 'line',
                data: {

                        label: sensorId,
                        data,
                        borderColor: '#0077cc',
                        borderWidth: 2,
                        fill: false,
                        tension: 0.3,
                        pointRadius: data.length > 100 ? 0 : 3,
                        pointHoverRadius: 5,

                    responsive: true,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { legend: { display: true } },
                    scales: {

                    }
                }
